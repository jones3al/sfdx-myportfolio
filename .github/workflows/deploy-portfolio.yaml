name: Deploy Portfolio on push to main
on:
  push:
    branches: [main]
    paths:
      - 'force-app/**'

jobs:
  Deploy-to-Production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 'Checkout source code'
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Now Install Salesforce CLI
      - name: 'Install Salesforce CLI'
        run: npm install @salesforce/cli --global

      - name: 'Installing sfdx git delta'
        run: |
          sf plugins install sfdx-git-delta
          sf plugins

      - name: 'Create delta packages'
        run: |
          mkdir changed-sources
          sf sgd source delta --to "HEAD" --from "HEAD~1" --output changed-sources/ --generate-delta --source force-app/
          echo "[INFO] Diff generated successfully"

      - name: 'Deploy to environment with running all local tests'
        run: |
          echo "${{ secrets.JWT_SERVER_KEY }}" > server.key
          sf org login jwt --username ${{ secrets.DEPLOYMENT_USERNAME }} --jwt-key-file server.key --clientid ${{ secrets.JWT_CLIENT_ID }} --instance-url ${{ vars.INSTANCE_URL }} --set-default
          sf project deploy start --source-dir changed-sources/force-app --test-level RunLocalTests --wait 10

